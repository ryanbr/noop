name: 🐞 Bug report
description: Report something in NOOP that doesn't work the way it should
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ### 💬 Just have a question, or "how do I…"?
        **Stop — this form is only for confirmed bugs.** If you want help, want to know how something works, or you're not sure it's a bug, you'll get a faster answer here:
        - **[Discussions](https://github.com/NoopApp/noop/discussions)** — questions, ideas, "is this normal?", feature requests.
        - **[Discord](https://discord.com/invite/nHK9FHczu)** — the quickest place for a quick question or setup help.

        Please use those instead of opening an issue. A question filed as a bug just gets pointed back here, so you'll get sorted faster by starting in the right place. 🙏

        ### ⛔ Next — is this already answered?
        Many "bugs" are expected behaviour or a known limit. **Please check these before filing — it's the fastest way to an answer:**
        - **[FAQ](https://github.com/NoopApp/noop/wiki/FAQ)** — live HR, recovery/sleep, steps, importing, privacy, updates.
        - **[WHOOP 5.0 / MG status](https://github.com/NoopApp/noop/wiki/WHOOP-5.0-and-MG-Status)** — SpO₂, steps, recovery/sleep on the newer straps (the most common topic).
        - **[Troubleshooting](https://github.com/NoopApp/noop/wiki/Troubleshooting)** — pairing, "syncs but no data", generic HR straps.

        ---

        NOOP runs **entirely on your device** — there are no servers or accounts for us to check, so a bug is almost always diagnosed from your **strap log**. A report without one (and without an obvious repro) usually can't be investigated and may be closed asking for the log.

        **Please don't strip out the fields below.** "Live HR works but no data" alone has half a dozen different causes — the version, platform, strap model and log are how we tell which one you've actually hit. A few seconds filling this in saves a day of back-and-forth. 🙏
  - type: input
    id: version
    attributes:
      label: NOOP version
      description: Settings → What's New, or the release tag (e.g. 2.0).
      placeholder: "2.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Android
        - iOS
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS version
      description: e.g. macOS 14.5 · Android 15 · iOS 18.5
    validations:
      required: true
  - type: dropdown
    id: strap
    attributes:
      label: WHOOP strap model
      options:
        - WHOOP 4.0
        - WHOOP 5.0
        - WHOOP MG
        - No strap — imported data only
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: source
    attributes:
      label: Where the data is coming from
      multiple: true
      description: Tick all that apply.
      options:
        - Live Bluetooth (strap connected)
        - WHOOP CSV export import
        - Apple Health import
        - Health Connect import
        - Oura import
        - Fitbit import
        - Garmin import
        - Xiaomi import
        - FIT / GPX / TCX import
    validations:
      required: true
  - type: dropdown
    id: test_profile
    attributes:
      label: Test Centre profile
      description: >-
        If you captured this with a Test Centre mode on, pick it here. The in-app Report button
        fills this in for you. Leave it as "Not a test-mode bug" otherwise.
      options:
        - Not a test-mode bug
        - Sleep & Rest
        - Connection & Sync
        - Workouts & GPS
        - Display & Performance
        - Import & Data Ingest
        - Steps
        - Notifications, Alarm & Wake
        - Battery & Charging
        - Recovery (Charge)
        - HRV & Autonomic
        - Sources, Fusion & Metric Decode
        - Stress & Illness
        - Longevity, Cycles & Haptics
        - Log everything
    validations:
      required: true
  - type: textarea
    id: what_happens
    attributes:
      label: What happens
      description: A clear description of the bug — what you actually saw.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Strap log
      description: >-
        Attach your exported .zip (drag it onto this box). Do NOT paste the whole log inline.
        Use the in-app Report button: Settings, Test Centre, Report, which saves a redacted
        noop-<profile>-<platform>-v<version>.zip and opens this form for you.
        If you can't attach, paste only the last ~50 lines in a <details> block.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I attached my exported NOOP .zip (not a screenshot of the Live screen). If my bug is a clearly reproducible UI issue I described exactly how to see it instead.
          required: true
        - label: I attached or pasted a strap log above — **or** my bug is a clearly reproducible UI issue that doesn't need one (e.g. a typo, a button that does nothing) and I've described exactly how to see it.
          required: true
        - label: I checked the [Troubleshooting guide](https://github.com/NoopApp/noop/wiki/Troubleshooting) — especially "history syncs but no data" (most often the strap isn't banking history to flash; charge it to 100% and reconnect).
          required: true
        - label: I checked the [FAQ](https://github.com/NoopApp/noop/wiki/FAQ) and — if I'm on a WHOOP 5.0 / MG — the [5.0/MG status page](https://github.com/NoopApp/noop/wiki/WHOOP-5.0-and-MG-Status), and this isn't an already-known limit (e.g. SpO₂, or recovery/sleep on the 5/MG).
          required: true
        - label: I've left out anything personal (strap serial, account email, raw export).
          required: true
